version: '3.8'

services:
  # Main Application Service
  app:
    image: ${APP_IMAGE:-ghcr.io/az2oo1/imamu-helper:latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # CockroachDB Database configuration
      - SQL_HOST=${SQL_HOST:-cockroachdb}
      - SQL_BACKUP_HOST=${SQL_BACKUP_HOST}
      - SQL_PORT=${SQL_PORT:-26257}
      - SQL_USER=${SQL_USER:-root}
      - SQL_PASSWORD=${SQL_PASSWORD:-}
      - SQL_DB_NAME=${SQL_DB_NAME:-defaultdb}
      - SQL_SSL=${SQL_SSL:-false}
      - DATABASE_URL=${DATABASE_URL:-postgresql://root@cockroachdb:26257/defaultdb?sslmode=disable}
      # RustFS S3 Object Storage configuration
      - S3_ENDPOINT=${S3_ENDPOINT:-http://rustfs:9000}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-rustfsadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-rustfspassword}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-imamu-uploads}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      # Optional features
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      - cockroachdb
      - rustfs
    restart: unless-stopped

  # CockroachDB Database Service (Distributed SQL, PG-compatible)
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.3
    container_name: imamu_cockroachdb
    command: start-single-node --insecure
    ports:
      - "26257:26257" # SQL Client Port
      - "8080:8080"   # CockroachDB Admin Web Console UI
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RustFS S3-Compatible Object Storage Service
  rustfs:
    image: rustfs/rustfs:latest
    container_name: imamu_rustfs
    environment:
      - RUSTFS_ACCESS_KEY=${S3_ACCESS_KEY_ID:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${S3_SECRET_ACCESS_KEY:-rustfspassword}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-rustfsadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-rustfspassword}
    ports:
      - "9000:9000" # S3 API Port
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

volumes:
  cockroach_data:
    driver: local
  rustfs_data:
    driver: local


